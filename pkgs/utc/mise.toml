[tasks."build/package"]
depends = ["//pkgs/dev:source/build", "//:source/install"]
run = "make build"
sources = [
  "package.json",
  "tsconfig.dist.json",
  "Makefile",
  "copy.mjs",
  "src/**/*",
  "!src/**/tests.ts",
  "README.md",
  "LICENSE.md",
  "CHANGELOG.md",
]
outputs = ["dist/**/*"]

[tasks."test"]
depends = ["test/unit", "test/node"]

[tasks."test/unit"]
run = "pnpm vitest run"

[tasks."test/unit:watch"]
run = "pnpm vitest"

[tasks."test/tz"]
run = "pnpm exec date-fns-test-tz ./src/"

[tasks."test/node"]
run = "./scripts/test/node.sh"

[tasks."test/smoke"]
usage = '''
arg "[test]" help="Smoke test to run" default="..."
'''
depends = "//pkgs/utc/examples/{{usage.test}}:test"
